version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: vox-postgres
    environment:
      POSTGRES_DB: vox
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vox-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server:latest
    container_name: vox-livekit
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"   # HTTP / API
      - "7881:7881"   # WebRTC / RTC
      - "7882:7882/udp" # WebRTC / UDP
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
